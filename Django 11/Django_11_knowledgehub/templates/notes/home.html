<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">

        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">Knowledge Hub</h1>
            <p class="lead text-muted">Welcome to the project management and notes platform</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">

                        <h3 class="mb-4 text-center">Navigation Menu</h3>

                        <div class="d-grid gap-3">

                            <a href="/contact/" class="btn btn-outline-primary btn-lg">
                                📩 Contact Feedback
                            </a>

                            <a href="/accounts/register/" class="btn btn-success btn-lg">
                                👤 Register
                            </a>

                            <a href="/accounts/login/" class="btn btn-warning btn-lg">
                                🔐 Login
                            </a>

                            <a href="/accounts/dashboard/" class="btn btn-info btn-lg text-white">
                                📊 Cabinet
                            </a>

                            <a href="/notes/create/" class="btn btn-dark btn-lg">
                                ✍️ Create Note
                            </a>

                            <a href="/notes/" class="btn btn-secondary btn-lg">
                                📚 Notes List
                            </a>

                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
