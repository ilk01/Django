{% extends "base.html" %}

{% block title %}
    Knowledge Hub - User Dashboard
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">

                    <h1 class="fw-bold text-center mb-4">
                        User Dashboard
                    </h1>

                    <p class="text-center fs-5 mb-5">
                        Welcome, <strong>{{ active_user }}</strong>
                    </p>

                    <div class="d-grid gap-3">

                        <a href="/notes/create/" class="btn btn-primary py-3 fw-semibold">
                            Create Note
                        </a>

                        <a href="/notes/" class="btn btn-success py-3 fw-semibold">
                            Notes List
                        </a>

                        <a href="/contact/" class="btn btn-warning py-3 fw-semibold">
                            Feedback
                        </a>

                    </div>

                    <hr class="my-4">

                    <p class="text-center mb-0">
                        <a href="/" class="text-decoration-none">
                            ← Return to Home Page
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
