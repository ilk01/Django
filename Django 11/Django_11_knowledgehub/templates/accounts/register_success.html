{% extends "base.html" %}

{% block title %}
    Knowledge Hub - Registration Success
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5 text-center">

                    <h1 class="fw-bold text-success mb-4">
                        Registration Successful 🎉
                    </h1>

                    <p class="fs-5 mb-4">
                        User <strong>{{ username }}</strong> registered successfully.
                    </p>

                    <div class="d-grid gap-3">
                        <a href="/accounts/login/" class="btn btn-primary py-2 fw-bold">
                            Go to Login Page
                        </a>

                        <a href="/" class="btn btn-outline-secondary py-2">
                            Return to Home Page
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
