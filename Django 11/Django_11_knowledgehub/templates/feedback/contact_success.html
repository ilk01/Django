{% extends 'base.html' %}

{% block title %}Сообщение отправлено - Knowledge Hub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow text-center">
            <div class="card-body py-5">
                <div class="mb-4">
                    <span style="font-size: 4rem;">✅</span>
                </div>
                <h3 class="card-title text-success">Спасибо за ваше сообщение!</h3>
                <p class="card-text text-muted">
                    Мы получили ваше сообщение и свяжемся с вами в ближайшее время.
                </p>
                <div class="mt-4">
                    <a href="{% url 'home' %}" class="btn btn-primary">На главную</a>
                    <a href="{% url 'contact' %}" class="btn btn-outline-primary ms-2">Отправить еще</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
