{% extends 'base.html' %}
{% block title %}Вход — Хабр{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-200px)] flex flex-col items-center justify-center py-12 px-4 bg-[#f0f0f0] dark:bg-[#1a1a1a] transition-colors duration-300">
    <div class="w-full max-w-[450px]">
        <div class="bg-white dark:bg-[#2a2a2a] p-10 shadow-sm border border-gray-100 dark:border-gray-800 transition-colors duration-300">
            <h1 class="text-[22px] font-bold mb-8 text-[#333] dark:text-gray-100">Вход</h1>
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-[14px] font-bold text-[#333] dark:text-gray-300 mb-2">
                        Email или никнейм
                    </label>
                    <input type="text" name="username" id="id_username"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1a1a] dark:text-gray-300 focus:border-[#548eaa] focus:outline-none text-[15px] transition-colors">
                </div>
                <div>
                    <label for="id_password" class="block text-[14px] font-bold text-[#333] dark:text-gray-300 mb-2">
                        Пароль
                    </label>
                    <input type="password" name="password" id="id_password"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1a1a] dark:text-gray-300 focus:border-[#548eaa] focus:outline-none text-[15px] transition-colors">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full bg-[#548eaa] hover:bg-[#4b7f99] text-white font-bold py-3 px-4 transition-colors text-[16px]">
                        Войти
                    </button>
                </div>
                <div class="text-center mt-4">
                    <a href="#" class="text-[13px] text-[#548eaa] hover:underline">Забыли пароль?</a>
                </div>
            </form>
        </div>
        <div class="mt-4 bg-white dark:bg-[#2a2a2a] p-4 text-center shadow-sm border border-gray-100 dark:border-gray-800 transition-colors duration-300">
            <p class="text-[14px] text-[#333] dark:text-gray-300">
                Ещё нет аккаунта? <a href="{% url 'register' %}" class="text-[#548eaa] hover:underline">Зарегистрируйтесь</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
