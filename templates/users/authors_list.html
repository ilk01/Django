{% extends 'base.html' %}

{% block title %}Авторы — Хабр{% endblock %}

{% block content %}
<div class="max-w-[1200px] mx-auto py-8 px-4">
    <h1 class="text-3xl font-bold mb-8 text-[#333] dark:text-gray-100">Авторы</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for author in authors %}
            <div class="bg-white dark:bg-[#2a2a2a] p-6 shadow-sm border border-gray-100 dark:border-gray-800 transition-colors duration-300">
                <div class="flex items-center space-x-4">
                    <div class="w-16 h-16 bg-[#548eaa] rounded text-white flex items-center justify-center font-bold text-2xl shadow-inner">
                        {{ author.username|slice:":1"|upper }}
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-[#333] dark:text-gray-100">
                            <a href="{% url 'profile' author.username %}" class="hover:text-[#548eaa] transition-colors">
                                @{{ author.username }}
                            </a>
                        </h2>
                        <p class="text-sm text-[#707e8c] dark:text-gray-400">{{ author.articles_count }} публикаций</p>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="col-span-full text-center py-20 text-[#707e8c] dark:text-gray-500">
                Авторов пока нет.
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
