{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="max-w-md w-full bg-white dark:bg-[#2a2a2a] p-8 rounded-lg shadow-lg border border-red-100 dark:border-red-900/30 text-center transition-colors duration-300">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-red-100 dark:bg-red-900/20 text-red-600 dark:text-red-500 rounded-full mb-6">
            <i class="fas fa-user-slash text-4xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-100 mb-4">Доступ ограничен</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8 text-lg">
            Ваш аккаунт был заблокирован за нарушение правил сообщества.
        </p>
        <div class="bg-red-50 dark:bg-red-900/10 p-4 rounded-md text-sm text-red-800 dark:text-red-400 mb-8 border border-red-200 dark:border-red-900/30">
            <i class="fas fa-info-circle mr-2"></i>
            Если вы считаете, что это произошло по ошибке, обратитесь в службу поддержки.
        </div>
        <a href="{% url 'article_list' %}" class="inline-block bg-[#548eaa] text-white px-8 py-3 rounded font-bold hover:bg-[#4b7f99] transition-colors">
            Вернуться на главную
        </a>
    </div>
</div>
{% endblock %}
