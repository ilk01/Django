<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Product Reviews{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border-color: #475569;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
        }
        .star-rating {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 2px rgba(245, 158, 11, 0.5));
        }
        .pagination-link {
            background: #1e293b;
            border: 1px solid #334155;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pagination-link:hover {
            background: #3b82f6;
            border-color: #60a5fa;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .pagination-active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="bg-slate-900 border-b border-slate-800 py-4 shadow-lg">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="{% url 'product_list' %}" class="text-2xl font-bold tracking-tight text-blue-400">
                <i class="fas fa-star-half-alt mr-2"></i>ReviewHub
            </a>
            <div class="space-x-4">
                {% if user.is_authenticated %}
                    <span class="text-slate-400 hidden sm:inline">Hello, {{ user.username }}!</span>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-slate-300 hover:text-white transition">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-slate-300 hover:text-white transition">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10 flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 py-6 text-center text-slate-500 text-sm">
        &copy; 2026 ReviewHub. All rights reserved.
    </footer>
</body>
</html>
